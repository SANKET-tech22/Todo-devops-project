<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps ToDo App</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

form{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input{
    flex:1;
    padding:10px;
    border-radius:5px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    background:#2ecc71;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#27ae60;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#f4f6f7;
    padding:12px;
    border-radius:5px;
    margin-bottom:10px;
    font-size:14px;
    border-left:5px solid #2ecc71;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>DevOps ToDo App</h1>

<form method="POST">
<input type="text" name="task" placeholder="Enter your task..." required>
<button type="submit">Add</button>
</form>

<ul>
{% for todo in todos %}
<li>{{todo.task}}</li>
{% endfor %}
</ul>

<div class="footer">
Powered by Flask • Docker • Jenkins • Kubernetes
</div>

</div>

</body>
</html>
